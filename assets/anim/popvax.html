<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML mRNA Vaccine Design</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  :root{
    --ink:#f4f1e7; --muted:#968f82; --accent:#c9a86a; --accent2:#c5905f; --line:#34363b;
  }
  :root[data-theme="teal"]{
    --ink:#ecd6ad; --muted:#a99b7f; --accent:#d3a05f; --accent2:#dca569; --line:#2c5b56;
  }
  :root[data-theme="ivory"]{
    --ink:#1a1714; --muted:#6e655c; --accent:#b9532f; --accent2:#b9532f; --line:#d9ccb8;
  }
  *{box-sizing:border-box}
  svg{display:block;width:100%;height:100%}
  text{font-family:system-ui,sans-serif;fill:var(--ink)}
  .lbl{font-size:13px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;fill:var(--accent)}
  .sub{font-size:10px;letter-spacing:.8px;text-transform:uppercase;fill:var(--muted)}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}
  .ink{stroke:var(--ink)}
  .acc{stroke:var(--accent)}
  .ac2{stroke:var(--accent2)}
  .ln{stroke:var(--line)}

  /* ---- master 4-phase clock: 11s ---- */
  .panel{opacity:0}
  #p1{animation:ph1 11s linear infinite}
  #p2{animation:ph2 11s linear infinite}
  #p3{animation:ph3 11s linear infinite}
  #p4{animation:ph4 11s linear infinite}
  @keyframes ph1{0%{opacity:0}2%{opacity:1}22%{opacity:1}26%{opacity:0}100%{opacity:0}}
  @keyframes ph2{0%,24%{opacity:0}27%{opacity:1}47%{opacity:1}51%{opacity:0}100%{opacity:0}}
  @keyframes ph3{0%,49%{opacity:0}52%{opacity:1}74%{opacity:1}78%{opacity:0}100%{opacity:0}}
  @keyframes ph4{0%,76%{opacity:0}79%{opacity:1}98%{opacity:1}100%{opacity:0}}

  .ttl{opacity:0}
  #t1{animation:ph1 11s linear infinite}
  #t2{animation:ph2 11s linear infinite}
  #t3{animation:ph3 11s linear infinite}
  #t4{animation:ph4 11s linear infinite}

  /* ANTIGEN: epitope pulse + binding flag wave */
  .epi{animation:epi 1.6s ease-in-out infinite}
  @keyframes epi{0%,100%{r:5;opacity:.55}50%{r:7.5;opacity:1}}
  .flag{transform-box:fill-box;transform-origin:left center;animation:flag 2.2s ease-in-out infinite}
  @keyframes flag{0%,100%{transform:skewX(0deg)}50%{transform:skewX(-10deg)}}
  .helix{stroke-dasharray:4 4;animation:dash 1.1s linear infinite}
  @keyframes dash{to{stroke-dashoffset:-16}}

  /* DISTOGRAM cells reveal */
  .cell{opacity:0;animation:cell 11s linear infinite}
  @keyframes cell{0%,26%{opacity:0}30%{opacity:var(--o)}47%{opacity:var(--o)}51%{opacity:0}100%{opacity:0}}

  /* CODON strip optimization swap */
  .swap{animation:swapc 1.4s ease-in-out infinite}
  @keyframes swapc{0%,100%{fill:var(--muted)}50%{fill:var(--accent)}}
  .scan{animation:scan 2.6s ease-in-out infinite}
  @keyframes scan{0%{transform:translateX(0)}100%{transform:translateX(300px)}}

  /* RNA fold draw */
  .fold{stroke-dasharray:520;stroke-dashoffset:520;animation:fold 11s linear infinite}
  @keyframes fold{0%,52%{stroke-dashoffset:520}66%{stroke-dashoffset:0}74%{stroke-dashoffset:0}78%{stroke-dashoffset:520}100%{stroke-dashoffset:520}}

  /* DOCK ligand glides into pocket */
  .lig{animation:dock 11s ease-in-out infinite}
  @keyframes dock{0%,79%{transform:translate(120px,-70px) rotate(-25deg);opacity:0}
    84%{opacity:1}90%{transform:translate(0,0) rotate(0deg);opacity:1}
    98%{transform:translate(0,0) rotate(0deg);opacity:1}100%{opacity:0}}
  .pocketGlow{animation:pg 1.8s ease-in-out infinite}
  @keyframes pg{0%,100%{opacity:.25}50%{opacity:.7}}

  .glow{filter:url(#glow)}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important}
    .panel,.ttl,.cell,.lig{opacity:1}
    #p2,#p3,#p4,#t2,#t3,#t4{opacity:0}
  }
</style>
</head>
<body>
<svg viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet" role="img"
     aria-label="Machine-learning mRNA vaccine design pipeline: antigen protein secondary structure with highlighted epitope and MHC binding site, a residue contact-map distogram, mRNA 5-prime-UTR CDS 3-prime-UTR codon optimization folding into stem-loop secondary structure with decreasing minimum free energy, and a ligand docking into a binding pocket with predicted binding affinity delta G.">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sheet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="var(--accent2)" stop-opacity=".4"/>
      <stop offset="1" stop-color="var(--accent2)" stop-opacity="1"/>
    </linearGradient>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="3" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="var(--accent2)"/>
    </marker>
    <linearGradient id="cbar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="var(--line)"/>
      <stop offset=".5" stop-color="var(--accent2)"/>
      <stop offset="1" stop-color="var(--accent)"/>
    </linearGradient>
  </defs>

  <!-- frame -->
  <rect x="14" y="14" width="772" height="472" rx="10" fill="none" stroke="var(--line)" stroke-width="1.2"/>

  <!-- header -->
  <text x="34" y="44" class="lbl">ML mRNA VACCINE DESIGN</text>
  <text x="766" y="44" text-anchor="end" class="sub">POPVAX · IN&#8202;SILICO PIPELINE</text>
  <line x1="34" y1="56" x2="766" y2="56" class="ln" stroke-width="1"/>

  <!-- phase title (bottom-left, cycling) -->
  <g class="mono">
    <text class="ttl lbl" id="t1" x="34" y="466">01 · ANTIGEN / EPITOPE</text>
    <text class="ttl lbl" id="t2" x="34" y="466">02 · DISTOGRAM</text>
    <text class="ttl lbl" id="t3" x="34" y="466">03 · CODON-OPT · RNA FOLD</text>
    <text class="ttl lbl" id="t4" x="34" y="466">04 · DOCK ΔG</text>
  </g>

  <!-- step ticker -->
  <g class="mono" font-size="10" fill="var(--muted)">
    <text x="766" y="466" text-anchor="end" id="ticker"></text>
  </g>

  <!-- ============ PHASE 1: ANTIGEN ============ -->
  <g id="p1" class="panel">
    <text x="400" y="92" text-anchor="middle" class="sub">ANTIGEN · SECONDARY STRUCTURE</text>
    <g class="glow">
      <!-- beta sheet 1 (arrow) -->
      <line x1="200" y1="200" x2="320" y2="200" stroke="url(#sheet)" stroke-width="13" marker-end="url(#ah)"/>
      <path d="M320,200 q40,0 50,40" fill="none" class="ink" stroke-width="3"/>
      <!-- alpha helix coil 1 -->
      <path class="helix acc" d="M370,240 c0,-26 34,-26 34,0 c0,26 34,26 34,0 c0,-26 34,-26 34,0 c0,26 34,26 34,0"
            fill="none" stroke-width="11" stroke-linecap="round"/>
      <text x="438" y="290" text-anchor="middle" class="sub">α-HELIX</text>
      <path d="M540,240 q34,0 40,38" fill="none" class="ink" stroke-width="3"/>
      <!-- beta sheet 2 (arrow) -->
      <line x1="580" y1="278" x2="470" y2="320" stroke="url(#sheet)" stroke-width="13" marker-end="url(#ah)"/>
      <text x="540" y="200" text-anchor="middle" class="sub">β-SHEET</text>
      <!-- alpha helix coil 2 -->
      <path class="helix ac2" d="M250,330 c0,-22 30,-22 30,0 c0,22 30,22 30,0 c0,-22 30,-22 30,0"
            fill="none" stroke-width="10" stroke-linecap="round" style="animation-direction:reverse"/>
    </g>

    <!-- epitope residues -->
    <g fill="var(--accent)">
      <circle class="epi glow" cx="410" cy="214" style="animation-delay:0s"/>
      <circle class="epi glow" cx="444" cy="266" style="animation-delay:.3s"/>
      <circle class="epi glow" cx="478" cy="214" style="animation-delay:.6s"/>
      <circle class="epi glow" cx="512" cy="266" style="animation-delay:.9s"/>
    </g>
    <text x="461" y="170" text-anchor="middle" class="lbl" font-size="11">EPITOPE</text>
    <path d="M461,176 L461,196" class="acc" stroke-width="1.2" stroke-dasharray="3 3"/>

    <!-- MHC / antibody binding-site flag -->
    <g transform="translate(560,330)">
      <line x1="0" y1="0" x2="0" y2="-70" class="ink" stroke-width="2"/>
      <g class="flag">
        <path d="M0,-70 L86,-70 L74,-56 L86,-42 L0,-42 Z" fill="var(--accent2)" opacity=".92"/>
        <text x="10" y="-50" font-size="11" font-weight="700" fill="var(--ink)" letter-spacing="1">MHC · Ab SITE</text>
      </g>
      <circle cx="0" cy="0" r="4" fill="var(--ink)"/>
    </g>
  </g>

  <!-- ============ PHASE 2: DISTOGRAM ============ -->
  <g id="p2" class="panel">
    <text x="400" y="92" text-anchor="middle" class="sub">DISTOGRAM · RESIDUE × RESIDUE CONTACT MAP</text>
    <g id="grid" transform="translate(300,120)"></g>
    <text x="300" y="135" class="sub mono" font-size="9">i →</text>
    <text x="288" y="135" text-anchor="end" class="sub mono" font-size="9" transform="rotate(-90 288 135)">↓ j</text>
    <!-- colorbar -->
    <g transform="translate(620,150)">
      <text x="0" y="-8" class="sub" font-size="9">Å CONTACT</text>
      <rect x="0" y="0" width="14" height="160" fill="url(#cbar)"/>
      <rect x="0" y="0" width="14" height="160" fill="none" stroke="var(--line)"/>
      <text x="22" y="8" class="sub mono" font-size="9">4Å</text>
      <text x="22" y="160" class="sub mono" font-size="9">20Å</text>
    </g>
  </g>

  <!-- ============ PHASE 3: CODON-OPT + RNA FOLD ============ -->
  <g id="p3" class="panel">
    <text x="400" y="92" text-anchor="middle" class="sub">mRNA SEQUENCE DESIGN</text>

    <!-- construct layout bar -->
    <g transform="translate(60,116)">
      <rect x="0"   y="0" width="120" height="22" fill="var(--line)" opacity=".55"/>
      <rect x="120" y="0" width="440" height="22" fill="none" stroke="var(--accent)" stroke-width="1.4"/>
      <rect x="560" y="0" width="120" height="22" fill="var(--line)" opacity=".55"/>
      <text x="60"  y="15" text-anchor="middle" class="mono" font-size="10" fill="var(--ink)">5′UTR</text>
      <text x="340" y="15" text-anchor="middle" class="mono" font-size="10" fill="var(--accent)">CDS</text>
      <text x="620" y="15" text-anchor="middle" class="mono" font-size="10" fill="var(--ink)">3′UTR</text>
      <text x="0" y="-6" class="mono" font-size="9" fill="var(--muted)">m7G CAP</text>
      <text x="680" y="-6" text-anchor="end" class="mono" font-size="9" fill="var(--muted)">AAAA…polyA</text>
    </g>

    <!-- codon strip with optimization -->
    <text x="60" y="168" class="lbl" font-size="11">CODON-OPT</text>
    <g id="codons" transform="translate(60,178)" class="mono" font-size="12"></g>
    <rect class="scan" x="56" y="178" width="40" height="26" fill="var(--accent)" opacity=".14"/>

    <!-- RNA secondary structure (stem-loops) -->
    <text x="60" y="246" class="lbl" font-size="11">RNA FOLD</text>
    <g transform="translate(120,250)" class="glow">
      <path class="fold acc" fill="none" stroke-width="3" stroke-linecap="round"
        d="M0,120
           C30,120 30,40 70,40
           C110,40 110,20 140,20
           C168,20 168,52 196,52
           C228,52 200,4 240,4
           C282,4 268,60 300,60
           C336,60 320,118 360,118
           C400,118 392,30 430,30
           C470,30 470,120 510,120"/>
      <g class="ac2" stroke-width="1.4" opacity=".7">
        <line x1="58" y1="58" x2="84" y2="58"/>
        <line x1="130" y1="34" x2="156" y2="34"/>
        <line x1="220" y1="20" x2="248" y2="20"/>
        <line x1="300" y1="74" x2="328" y2="74"/>
        <line x1="402" y1="46" x2="430" y2="46"/>
      </g>
      <text x="240" y="-6" text-anchor="middle" class="sub" font-size="9">HAIRPIN</text>
      <text x="430" y="14" text-anchor="middle" class="sub" font-size="9">STEM-LOOP</text>
    </g>

    <!-- MFE readout -->
    <g transform="translate(560,300)">
      <rect x="0" y="0" width="190" height="58" rx="6" fill="none" stroke="var(--line)" stroke-width="1.2"/>
      <text x="14" y="22" class="sub" font-size="10">MFE · MIN FREE ENERGY</text>
      <text id="mfe" x="14" y="48" class="mono" font-size="22" font-weight="700" fill="var(--accent)">−0.0</text>
      <text x="178" y="48" text-anchor="end" class="mono" font-size="11" fill="var(--muted)">kcal/mol</text>
    </g>
  </g>

  <!-- ============ PHASE 4: DOCK ============ -->
  <g id="p4" class="panel">
    <text x="400" y="92" text-anchor="middle" class="sub">DOCK · IMMUNOGEN INTO BINDING POCKET</text>

    <!-- receptor surface with pocket -->
    <g class="glow">
      <path d="M210,330
               C210,250 300,230 360,250
               C380,210 470,210 480,260
               C540,250 600,280 600,340
               C600,400 470,410 400,400
               C330,410 210,400 210,330 Z"
            fill="none" stroke="var(--ink)" stroke-width="2.4" opacity=".85"/>
      <path d="M372,262 C352,300 372,348 410,352 C452,356 470,318 456,288
               C440,300 420,300 408,288 C396,278 388,272 372,262 Z"
            fill="var(--accent2)" class="pocketGlow"/>
      <path d="M372,262 C352,300 372,348 410,352 C452,356 470,318 456,288"
            fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-dasharray="4 4"/>
      <text x="414" y="312" text-anchor="middle" class="sub" font-size="9" fill="var(--ink)">POCKET</text>
    </g>

    <!-- docking ligand / immunogen -->
    <g class="lig">
      <g transform="translate(414,308)" class="glow">
        <line x1="-16" y1="-10" x2="0" y2="0" class="acc" stroke-width="2"/>
        <line x1="0" y1="0" x2="16" y2="-8" class="acc" stroke-width="2"/>
        <line x1="0" y1="0" x2="6" y2="16" class="acc" stroke-width="2"/>
        <line x1="16" y1="-8" x2="28" y2="2" class="acc" stroke-width="2"/>
        <circle cx="-16" cy="-10" r="5" fill="var(--accent)"/>
        <circle cx="0" cy="0" r="6" fill="var(--accent)"/>
        <circle cx="16" cy="-8" r="5" fill="var(--accent2)"/>
        <circle cx="6" cy="16" r="4.5" fill="var(--accent2)"/>
        <circle cx="28" cy="2" r="4.5" fill="var(--accent)"/>
      </g>
    </g>

    <!-- affinity / immunogenicity readout -->
    <g transform="translate(560,120)">
      <rect x="0" y="0" width="200" height="92" rx="6" fill="none" stroke="var(--line)" stroke-width="1.2"/>
      <text x="14" y="24" class="sub" font-size="10">BINDING AFFINITY ΔG</text>
      <text id="dg" x="14" y="52" class="mono" font-size="24" font-weight="700" fill="var(--accent)">−0.0</text>
      <text x="186" y="52" text-anchor="end" class="mono" font-size="11" fill="var(--muted)">kcal/mol</text>
      <line x1="14" y1="64" x2="186" y2="64" class="ln" stroke-width="1"/>
      <text x="14" y="80" class="sub" font-size="9">IMMUNOGENICITY</text>
      <text id="imm" x="186" y="80" text-anchor="end" class="mono" font-size="12" font-weight="700" fill="var(--accent2)">0.00</text>
    </g>
  </g>
</svg>

<script>
(function(){
  var p=new URLSearchParams(location.search), t=p.get('theme');
  if(t==='teal'||t==='ivory') document.documentElement.setAttribute('data-theme',t);

  var reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var NS="http://www.w3.org/2000/svg";

  // ---- DISTOGRAM grid (symmetric contact map) ----
  var grid=document.getElementById('grid'), N=20, cs=15;
  function val(i,j){
    var d=Math.abs(i-j);
    var v=Math.exp(-d*d/9);                                   // bright diagonal
    v=Math.max(v, 0.85*Math.exp(-Math.pow((i+j)-19,2)/10));   // anti-parallel beta band
    v=Math.max(v, 0.7*Math.exp(-(Math.pow(i-4,2)+Math.pow(j-15,2))/8));  // long-range contact
    v=Math.max(v, 0.7*Math.exp(-(Math.pow(i-15,2)+Math.pow(j-4,2))/8));  // symmetric pair
    return v;
  }
  for(var i=0;i<N;i++)for(var j=0;j<N;j++){
    var v=val(i,j);
    var r=document.createElementNS(NS,'rect');
    r.setAttribute('x',i*cs); r.setAttribute('y',j*cs);
    r.setAttribute('width',cs-1); r.setAttribute('height',cs-1);
    var col = v>0.5? 'var(--accent)' : (v>0.18? 'var(--accent2)':'var(--line)');
    r.setAttribute('fill',col);
    r.setAttribute('class','cell');
    r.style.setProperty('--o', (0.18+0.82*v).toFixed(3));
    r.style.animationDelay = ((i+j)*0.012)+'s';
    grid.appendChild(r);
  }

  // ---- CODON strip ----
  var codons=document.getElementById('codons');
  var seq=['AUG','GCC','AAG','CUG','GUG','UUC','ACA','GGC','CCU','AGC','UAC','GAA','GAC','AAU','CGG','UGA'];
  var optMap={'GCC':'GCU','CUG':'CUC','GGC':'GGU','AGC':'UCC','GAA':'GAG','CGG':'CGU'};
  var cx=0, cells=[];
  seq.forEach(function(c,idx){
    var g=document.createElementNS(NS,'text');
    g.setAttribute('x',cx); g.setAttribute('y',16);
    g.textContent=c;
    g.setAttribute('fill', idx===0||idx===seq.length-1?'var(--accent2)':'var(--muted)');
    if(optMap[c]){ g.setAttribute('class','swap'); g.style.animationDelay=(idx*0.12)+'s'; cells.push({el:g,a:c,b:optMap[c]}); }
    codons.appendChild(g);
    cx+= c.length*9 + 6;
  });
  if(!reduce) setInterval(function(){
    cells.forEach(function(o){ o.el.textContent = o.el.textContent===o.a? o.b : o.a; });
  },1400);

  // ---- numeric readouts driven by master clock ----
  var mfe=document.getElementById('mfe'),
      dg=document.getElementById('dg'),
      imm=document.getElementById('imm'),
      ticker=document.getElementById('ticker');
  var T=11000, t0=performance.now();
  function lerp(a,b,x){return a+(b-a)*x;}
  function clamp01(x){return x<0?0:x>1?1:x;}
  var steps=['scan: SEQ→STRUCT','contact: 12.4k pairs','codon: CAI 0.94','fold: ΔΔG opt','dock: pose 1/64'];

  function frame(now){
    var ph=((now-t0)%T)/T;
    var f3=clamp01((ph-0.55)/0.16);
    mfe.textContent = '−'+lerp(41,118,f3).toFixed(1);
    var f4=clamp01((ph-0.80)/0.14);
    dg.textContent  = '−'+lerp(2.1,11.4,f4).toFixed(1);
    imm.textContent = lerp(0.31,0.92,f4).toFixed(2);
    ticker.textContent = steps[Math.floor(ph*5)%5];
    requestAnimationFrame(frame);
  }
  if(!reduce) requestAnimationFrame(frame);
  else { mfe.textContent='−118.0'; dg.textContent='−11.4'; imm.textContent='0.92'; ticker.textContent='dock: pose 1/64'; }
})();
</script>
</body>
</html>
