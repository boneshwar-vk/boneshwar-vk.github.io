<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Real-time Sports CV</title>
<style>
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}

  :root{
    --ink:#f4f1e7; --muted:#968f82; --accent:#c9a86a; --accent2:#c5905f; --line:#34363b;
  }
  :root[data-theme="teal"]{
    --ink:#ecd6ad; --muted:#a99b7f; --accent:#d3a05f; --accent2:#dca569; --line:#2c5b56;
  }
  :root[data-theme="ivory"]{
    --ink:#1a1714; --muted:#6e655c; --accent:#b9532f; --accent2:#b9532f; --line:#d9ccb8;
  }

  #stage{width:100%;height:100%;display:block}

  .lbl{font-family:system-ui,sans-serif;font-weight:600;letter-spacing:.06em;
       fill:var(--muted);text-transform:uppercase}
  .lbl-ink{fill:var(--ink)}
  .lbl-acc{fill:var(--accent)}
  .mono{font-family:ui-monospace,"SFMono-Regular",Menlo,monospace}

  .line{stroke:var(--line)}
  .ink{stroke:var(--ink)}
  .acc{stroke:var(--accent)}
  .acc2{stroke:var(--accent2)}

  /* ---------- master cadence: 10s loop ---------- */
  /* Phase gates fade groups in/out so each stage reads cleanly */
  @keyframes ph1{0%,4%{opacity:0}8%,34%{opacity:1}40%,100%{opacity:.18}}
  @keyframes ph2{0%,30%{opacity:0}36%,64%{opacity:1}70%,100%{opacity:.18}}
  @keyframes ph3{0%,62%{opacity:0}68%,94%{opacity:1}100%{opacity:.18}}

  #g-backbone{animation:ph1 10s ease-in-out infinite}
  #g-pose{animation:ph2 10s ease-in-out infinite}
  #g-track{animation:ph2 10s ease-in-out infinite}
  #g-classify{animation:ph3 10s ease-in-out infinite}

  /* frame scan-line sweep */
  @keyframes scan{0%{transform:translateY(0)}100%{transform:translateY(86px)}}
  #scan{animation:scan 1.6s linear infinite}

  /* conv tiles pop in, staggered, shrinking footprint (downsample) */
  @keyframes pop{0%,3%{opacity:0;transform:scale(.6)}10%{opacity:1;transform:scale(1)}
                 100%{opacity:1;transform:scale(1)}}
  .tile{transform-box:fill-box;transform-origin:center}
  #t1{animation:pop 10s ease-out infinite;animation-delay:.0s}
  #t2{animation:pop 10s ease-out infinite;animation-delay:.25s}
  #t3{animation:pop 10s ease-out infinite;animation-delay:.5s}
  .flow{stroke-dasharray:4 5;animation:flow 1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-9}}

  /* heatmap blobs breathe */
  @keyframes blob{0%,100%{opacity:.55;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}}
  .heat{transform-box:fill-box;transform-origin:center;
        animation:blob 1.8s ease-in-out infinite}

  /* skeleton limb draw-on */
  @keyframes draw{to{stroke-dashoffset:0}}
  .limb{stroke-dasharray:60;stroke-dashoffset:60;animation:draw 10s ease-out infinite}

  /* joint pulse */
  @keyframes jp{0%,100%{r:3}50%{r:4.4}}
  .joint{animation:jp 1.6s ease-in-out infinite}

  /* bbox dashes march */
  .bbox{stroke-dasharray:7 4;animation:march 1.2s linear infinite}
  @keyframes march{to{stroke-dashoffset:-22}}

  /* ----- Kalman: ball travels along trajectory, ellipse shrinks on update ----- */
  @keyframes ball{
    0%,30%{opacity:0}
    36%{opacity:1;offset-distance:0%}
    64%{opacity:1;offset-distance:100%}
    70%,100%{opacity:0;offset-distance:100%}
  }
  #ball{offset-path:path("M560,300 C600,210 660,170 720,205");
        animation:ball 10s linear infinite}

  /* measurement crosses blink in sequence */
  @keyframes meas{0%,40%{opacity:0}45%{opacity:1}60%{opacity:1}66%{opacity:.2}100%{opacity:.2}}
  .meas{animation:meas 10s linear infinite}
  #m1{animation-delay:.0s}#m2{animation-delay:.6s}#m3{animation-delay:1.2s}

  /* covariance ellipse: large (predict) -> small (update) cyclically */
  @keyframes cov{
    0%,34%{rx:26;ry:18;opacity:.0;stroke-opacity:0}
    40%{rx:26;ry:18;opacity:.9;stroke-opacity:.9}
    52%{rx:9;ry:6;opacity:.9}
    60%{rx:24;ry:16;opacity:.85}
    66%{rx:8;ry:5;opacity:.9}
    72%,100%{rx:8;ry:5;opacity:0;stroke-opacity:0}
  }
  #cov{animation:cov 10s ease-in-out infinite}

  /* trajectory arc draws */
  .traj{stroke-dasharray:230;stroke-dashoffset:230;
        animation:traj 10s ease-out infinite}
  @keyframes traj{0%,33%{stroke-dashoffset:230}55%,100%{stroke-dashoffset:0}}

  /* shot label slide/glow */
  @keyframes emit{0%,64%{opacity:0;transform:translateY(6px)}
                  70%{opacity:1;transform:translateY(0)}100%{opacity:1;transform:translateY(0)}}
  #shotcard{transform-box:fill-box;transform-origin:center;
            animation:emit 10s ease-out infinite}
  @keyframes barfill{0%,66%{width:0}80%,100%{width:64px}}
  #conf-fill{animation:barfill 10s ease-out infinite}

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important}
    #g-backbone,#g-pose,#g-track,#g-classify{opacity:1!important}
    .limb{stroke-dashoffset:0!important}
    .traj{stroke-dashoffset:0!important}
    #cov{rx:8;ry:5;opacity:.9}
    #ball{offset-distance:78%;opacity:1}
    .meas{opacity:1!important}
    #conf-fill{width:64px}
    #shotcard{opacity:1!important}
    #t1,#t2,#t3{opacity:1!important;transform:scale(1)!important}
  }
</style>
</head>
<body>
<svg id="stage" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet"
     width="100%" height="100%" role="img"
     aria-label="Real-time sports computer-vision pipeline: a video frame passes through a MobileNet-V2 backbone producing downsampled convolutional feature maps and keypoint heatmaps, an overlaid human skeleton with joints and limbs plus a detected cricket-bat bounding box with confidence; a ball is tracked with a Kalman filter showing predict and measurement-update steps, a shrinking covariance ellipse and a predicted projectile trajectory arc; finally a shot is classified as cover drive with a confidence and F1 readout.">

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="var(--accent)" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tilegrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="var(--accent2)" stop-opacity="0.30"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--muted)"/>
    </marker>
    <marker id="arwA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"/>
    </marker>
  </defs>

  <!-- ===== stage headers ===== -->
  <text class="lbl lbl-acc" x="40"  y="40" font-size="13">1 · BACKBONE</text>
  <text class="lbl lbl-acc" x="318" y="40" font-size="13">2 · POSE + TRACK</text>
  <text class="lbl lbl-acc" x="600" y="40" font-size="13">3 · CLASSIFY</text>
  <line class="line" x1="40" y1="50" x2="760" y2="50" stroke-width="1" opacity="0.5"/>

  <!-- ================= 1 · BACKBONE ================= -->
  <g id="g-backbone">
    <!-- input video frame -->
    <g transform="translate(40,86)">
      <rect width="92" height="86" rx="3" fill="none" class="ink" stroke-width="1.4"/>
      <rect x="3" y="3" width="86" height="80" rx="2" fill="var(--line)" opacity="0.35"/>
      <!-- crude pitch + figure to suggest a sports frame -->
      <line class="line" x1="6" y1="64" x2="86" y2="64" stroke-width="1"/>
      <circle cx="30" cy="44" r="7" class="ink" stroke-width="1.2" fill="none"/>
      <path d="M30,51 L30,66 M30,56 L22,62 M30,56 L40,60 M30,66 L24,76 M30,66 L37,76"
            class="ink" fill="none" stroke-width="1.2"/>
      <circle cx="58" cy="40" r="3" fill="var(--accent)"/>
      <g id="scan">
        <line x1="3" y1="3" x2="89" y2="3" class="acc" stroke-width="1.4" opacity="0.8"/>
      </g>
      <text class="lbl lbl-ink" x="0" y="-8" font-size="11">VIDEO FRAME</text>
      <text class="lbl mono" x="0" y="100" font-size="9.5" fill="var(--muted)">224×224×3</text>
    </g>

    <!-- conv feature-map tiles, downsampling -->
    <g transform="translate(150,88)">
      <g id="t1" class="tile">
        <rect x="0" y="6" width="60" height="60" rx="2" fill="url(#tilegrad)" class="acc2" stroke-width="1"/>
        <path d="M6,18 H54 M6,30 H54 M6,42 H54 M6,54 H54 M18,12 V60 M30,12 V60 M42,12 V60"
              class="line" stroke-width="0.5" opacity="0.6"/>
      </g>
      <g id="t2" class="tile" transform="translate(70,12)">
        <rect x="0" y="6" width="44" height="44" rx="2" fill="url(#tilegrad)" class="acc2" stroke-width="1"/>
        <path d="M5,17 H39 M5,28 H39 M5,39 H39 M16,11 V50 M27,11 V50 M38,11 V50"
              class="line" stroke-width="0.5" opacity="0.6"/>
      </g>
      <g id="t3" class="tile" transform="translate(124,22)">
        <rect x="0" y="6" width="30" height="30" rx="2" fill="url(#tilegrad)" class="acc2" stroke-width="1"/>
        <path d="M4,16 H26 M4,26 H26 M14,8 V36 M24,8 V36" class="line" stroke-width="0.5" opacity="0.6"/>
      </g>
      <!-- flow arrows through depthwise-separable blocks -->
      <line class="line flow" x1="60" y1="36" x2="70" y2="34" stroke-width="1.2" marker-end="url(#arw)"/>
      <line class="line flow" x1="114" y1="34" x2="124" y2="38" stroke-width="1.2" marker-end="url(#arw)"/>
      <text class="lbl lbl-ink" x="0" y="-4" font-size="11">MobileNetV2</text>
      <text class="lbl mono" x="0" y="84" font-size="9" fill="var(--muted)">112² → 56² → 28²  ·  DW-SEP CONV</text>
    </g>

    <!-- arrow into pose stage -->
    <line class="acc flow" x1="290" y1="128" x2="318" y2="128" stroke-width="1.6" marker-end="url(#arwA)"/>
  </g>

  <!-- ================= 2 · POSE (heatmaps + skeleton + bbox) ================= -->
  <g id="g-pose">
    <g transform="translate(320,70)">
      <!-- detection canvas -->
      <rect width="150" height="190" rx="4" fill="none" class="line" stroke-width="1"/>

      <!-- KEYPOINT HEATMAPS (Gaussian blobs at joints) -->
      <g opacity="0.95">
        <circle class="heat" cx="75" cy="34"  r="13" fill="url(#glow)" style="animation-delay:0s"/>
        <circle class="heat" cx="56" cy="74"  r="12" fill="url(#glow)" style="animation-delay:.2s"/>
        <circle class="heat" cx="94" cy="74"  r="12" fill="url(#glow)" style="animation-delay:.35s"/>
        <circle class="heat" cx="48" cy="112" r="11" fill="url(#glow)" style="animation-delay:.5s"/>
        <circle class="heat" cx="102" cy="112" r="11" fill="url(#glow)" style="animation-delay:.65s"/>
        <circle class="heat" cx="64" cy="150" r="11" fill="url(#glow)" style="animation-delay:.8s"/>
        <circle class="heat" cx="90" cy="150" r="11" fill="url(#glow)" style="animation-delay:.95s"/>
      </g>

      <!-- SKELETON limbs -->
      <g class="ink" fill="none" stroke-width="2.2" stroke-linecap="round">
        <path class="limb" d="M75,34 L65,72"  style="animation-delay:.1s"/>
        <path class="limb" d="M65,72 L85,72"  style="animation-delay:.2s"/>
        <path class="limb" d="M65,72 L52,108" style="animation-delay:.3s"/>
        <path class="limb" d="M85,72 L98,108" style="animation-delay:.4s"/>
        <path class="limb" d="M65,72 L72,112" style="animation-delay:.5s"/>
        <path class="limb" d="M85,72 L88,112" style="animation-delay:.55s"/>
        <path class="limb" d="M72,112 L64,150" style="animation-delay:.65s"/>
        <path class="limb" d="M88,112 L90,150" style="animation-delay:.75s"/>
      </g>
      <!-- joints -->
      <g fill="var(--accent)" stroke="var(--ink)" stroke-width="0.8">
        <circle class="joint" cx="75" cy="34"/>
        <circle class="joint" cx="65" cy="72"/>
        <circle class="joint" cx="85" cy="72"/>
        <circle class="joint" cx="52" cy="108"/>
        <circle class="joint" cx="98" cy="108"/>
        <circle class="joint" cx="72" cy="112"/>
        <circle class="joint" cx="88" cy="112"/>
        <circle class="joint" cx="64" cy="150"/>
        <circle class="joint" cx="90" cy="150"/>
      </g>

      <!-- cricket-bat BBOX -->
      <rect class="acc2 bbox" x="96" y="96" width="40" height="74" fill="none" stroke-width="1.8"/>
      <line class="acc2" x1="116" y1="104" x2="116" y2="160" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
      <rect x="96" y="84" width="64" height="13" rx="2" fill="var(--accent2)"/>
      <text class="lbl mono" x="99" y="94" font-size="9" fill="var(--ink)">BAT 0.94</text>

      <text class="lbl lbl-ink" x="0" y="-22" font-size="11">HEATMAP · KEYPOINTS</text>
      <text class="lbl" x="0" y="-9" font-size="10">17-JOINT SKELETON · BBOX</text>
    </g>
  </g>

  <!-- ================= 2b · TRACK (Kalman) ================= -->
  <g id="g-track">
    <g transform="translate(490,70)">
      <text class="lbl lbl-ink" x="0" y="0" font-size="11">KALMAN · BALL TRACKING</text>

      <!-- ground/reference -->
      <line class="line" x1="0" y1="170" x2="270" y2="170" stroke-width="1" opacity="0.6"/>

      <!-- predicted projectile TRAJECTORY arc -->
      <path class="acc traj" d="M70,230 C110,140 170,100 230,135"
            fill="none" stroke-width="2" opacity="0.9"/>
      <!-- predict-step extrapolation (faded continuation) -->
      <path class="line" d="M230,135 C250,150 262,162 270,180"
            fill="none" stroke-width="1.4" stroke-dasharray="3 4" opacity="0.7"/>
      <text class="lbl" x="120" y="92" font-size="10">TRAJECTORY  ŷ = f(x,v,g)</text>

      <!-- measurement crosses (z_k) -->
      <g class="acc2" stroke-width="1.6">
        <g class="meas" id="m1"><line x1="103" y1="172" x2="113" y2="182"/><line x1="113" y1="172" x2="103" y2="182"/></g>
        <g class="meas" id="m2"><line x1="150" y1="142" x2="160" y2="152"/><line x1="160" y1="142" x2="150" y2="152"/></g>
        <g class="meas" id="m3"><line x1="196" y1="138" x2="206" y2="148"/><line x1="206" y1="138" x2="196" y2="148"/></g>
      </g>

      <!-- covariance ellipse (predict large -> update small) -->
      <ellipse id="cov" cx="160" cy="118" rx="24" ry="16"
               fill="var(--accent)" fill-opacity="0.12"
               stroke="var(--accent)" stroke-width="1.4"
               transform="rotate(-28 160 118)"/>

      <!-- tracked ball moving along path -->
      <circle id="ball" r="5" fill="var(--accent)" stroke="var(--ink)" stroke-width="0.8"/>

      <!-- predict / update legend -->
      <g transform="translate(0,196)">
        <line class="acc" x1="0" y1="0" x2="16" y2="0" stroke-width="2" stroke-dasharray="3 3"/>
        <text class="lbl" x="20" y="3" font-size="9.5">PREDICT  x̂⁻=Fx̂</text>
        <line class="acc2" x1="120" y1="0" x2="136" y2="0" stroke-width="2"/>
        <text class="lbl" x="140" y="3" font-size="9.5">UPDATE  +K(z−Hx̂)</text>
      </g>
    </g>
  </g>

  <!-- ================= 3 · CLASSIFY ================= -->
  <g id="g-classify">
    <line class="acc flow" x1="760" y1="300" x2="760" y2="330" stroke-width="0" />
    <g id="shotcard" transform="translate(560,360)">
      <rect width="210" height="92" rx="6" fill="var(--line)" opacity="0.30"/>
      <rect width="210" height="92" rx="6" fill="none" class="acc" stroke-width="1.4"/>
      <text class="lbl" x="14" y="22" font-size="10">SHOT CLASSIFICATION</text>
      <text class="lbl lbl-acc" x="14" y="48" font-size="20" font-weight="700"
            letter-spacing="0.02em" style="text-transform:uppercase">COVER DRIVE</text>

      <!-- confidence bar -->
      <text class="lbl mono" x="14" y="70" font-size="10" fill="var(--muted)">CONF</text>
      <rect x="50" y="62" width="64" height="8" rx="4" fill="var(--line)" opacity="0.6"/>
      <rect id="conf-fill" x="50" y="62" width="0" height="8" rx="4" fill="var(--accent)"/>
      <text class="lbl mono" x="120" y="70" font-size="10" fill="var(--ink)">0.91</text>
      <text class="lbl mono" x="150" y="70" font-size="10" fill="var(--muted)">F1 0.88</text>

      <text class="lbl mono" x="14" y="86" font-size="9" fill="var(--muted)">SOFTMAX · 12 CLASSES</text>
    </g>
    <!-- connector from pipeline to shot card -->
    <path class="acc flow" d="M620,265 C620,310 640,330 660,358" fill="none"
          stroke-width="1.4" marker-end="url(#arwA)" opacity="0.8"/>
  </g>

  <!-- footer model tag -->
  <text class="lbl mono" x="40" y="486" font-size="9.5" fill="var(--muted)">
    REAL-TIME SPORTS CV  ·  MobileNetV2 BACKBONE  ·  POSE + KALMAN  ·  ~60 FPS
  </text>
</svg>

<script>
  (function(){
    try{
      var p = new URLSearchParams(location.search);
      var t = (p.get('theme')||'charcoal').toLowerCase();
      if(['charcoal','teal','ivory'].indexOf(t)<0) t='charcoal';
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){
      document.documentElement.setAttribute('data-theme','charcoal');
    }
  })();
</script>
</body>
</html>
